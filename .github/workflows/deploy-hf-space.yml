name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hf-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_REPO_ID: Ishangtxl/SafeSpace
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Ensure Hugging Face token is configured
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "Missing GitHub Actions secret: HF_TOKEN" >&2
            exit 1
          fi

      - name: Sync project dependencies
        run: uv sync --frozen

      - name: Validate OpenEnv environment
        run: uv run openenv validate .

      - name: Deploy to Hugging Face Space
        run: uv run openenv push --repo-id "${HF_SPACE_REPO_ID}" .
